services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: staffswipe
      POSTGRES_PASSWORD: staffswipe
      POSTGRES_DB: staffswipe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffswipe"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://staffswipe:staffswipe@db:5432/staffswipe
      JWT_SECRET: change-me-in-prod
      DEV_MODE: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
