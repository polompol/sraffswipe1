# Автообновление зависимостей: раз в неделю Dependabot открывает PR с
# обновлениями библиотек (включая security-патчи). CI прогоняет тесты —
# зелёный PR можно мёржить в один клик.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/tma"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
