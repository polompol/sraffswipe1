name: TMA CI

on:
  push:
    branches: ["**"]
    paths: ["tma/**", ".github/workflows/tma.yml"]
  pull_request:
    paths: ["tma/**", ".github/workflows/tma.yml"]

jobs:
  build:
    name: Typecheck & build (Telegram Mini App)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tma
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tma/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
